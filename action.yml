name: Discord PR Sync
description: >
  Sync GitHub pull request events to a Discord forum channel as threads,
  with forum tags reflecting the PR lifecycle.

branding:
  icon: message-circle
  color: purple

inputs:
  github-token:
    description: >
      GitHub token with pull-requests: write scope.
      Usually `secrets.GITHUB_TOKEN`.
    required: true
  discord-bot-token:
    description: Discord bot token (from the Developer Portal).
    required: true
  discord-forum-channel-id:
    description: ID of the Discord forum channel for this repo.
    required: true
  discord-tag-ids-json:
    description: >
      Optional JSON map of tag name → tag ID. If omitted, the action
      fetches tag IDs from Discord on every run (one extra API call).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Node 20
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '20'

    - name: Run sync script
      shell: bash
      run: node "${{ github.action_path }}/scripts/sync-pr.mjs"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DISCORD_BOT_TOKEN: ${{ inputs.discord-bot-token }}
        DISCORD_FORUM_CHANNEL_ID: ${{ inputs.discord-forum-channel-id }}
        DISCORD_TAG_IDS_JSON: ${{ inputs.discord-tag-ids-json }}
